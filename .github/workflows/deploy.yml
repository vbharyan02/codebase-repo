name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROD_REPO_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "pipeline-bot@github.com"
          git config --global user.name "Pipeline Bot"

      - name: Clone prod repo with token
        run: |
          echo "Cloning taskmaster-prod..."
          git clone https://x-access-token:${{ secrets.PROD_REPO_TOKEN }}@github.com/vbharyan02/taskmaster-prod.git prod-repo
          echo "Clone done."

      - name: Clean and copy frontend files
        run: |
          rm -rf prod-repo/frontend
          mkdir -p prod-repo/frontend
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            frontend/ prod-repo/frontend/
          echo "Files copied."

      - name: Commit and push to prod repo
        run: |
          cd prod-repo
          git config user.email "pipeline-bot@github.com"
          git config user.name "Pipeline Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "deploy: sync from codebase $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push https://x-access-token:${{ secrets.PROD_REPO_TOKEN }}@github.com/vbharyan02/taskmaster-prod.git HEAD:main
            echo "Pushed to taskmaster-prod successfully."
          fi
